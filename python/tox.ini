[tox]
minversion = 3.8.0
envlist = lint, unit, py{312,313,314}
isolated_build = true

[gh-actions]
python =
    3.12: py312, unit
    3.13: py313, unit
    3.14: py314, unit

# Base config inherited by py{312,313,314} version-specific environments
[testenv]
extras = tests
commands =
    python -m pytest -v

[testenv:unit]
description = Version-agnostic unit test run

[testenv:lint]
description = Lint source code
deps =
    ruff>=0.6.4
commands =
    ruff check .
    ruff format --check .
