[tox]
minversion = 3.8.0
envlist = lint, unit, py{310,311,312}
isolated_build = true

[gh-actions]
python =
    3.10: py310, unit
    3.11: py311, unit
    3.12: py312, lint, unit

[testenv:unit]
description = Unit test
extras = tests
commands =
    python -m pytest -v

[testenv:lint]
description = lint source code
deps =
    ruff>=0.6.4
commands =
    ruff check .
    ruff format --check .
