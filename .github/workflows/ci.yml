name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Stage 1: compile the FST binary ─────────────────────────────────────────
  build:
    name: Build FSTs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install FST compiler and locale tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make sfst locales git
          sudo locale-gen ml_IN.UTF-8

      - name: Compile FSTs
        run: make malayalam.a

      - name: Upload compiled FSA
        uses: actions/upload-artifact@v7
        with:
          name: malayalam-fsa
          path: malayalam.a
          retention-days: 1

  # ── Stage 2a: FST-level functional tests (tests/tests.json) ─────────────────
  test-fst:
    name: FST functional tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Install FST tools, Python and locale tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make sfst python3 python3-pip locales git
          sudo locale-gen ml_IN.UTF-8

      - name: Download compiled FSA
        uses: actions/download-artifact@v8
        with:
          name: malayalam-fsa

      # make test → runs `make -C python` (copies FSA, pip install -e) then
      # python tests/mlmorph-test.py; the sfst Python package is pulled in by
      # pip install as a declared dependency.
      - name: Run FST functional tests
        run: LC_ALL=ml_IN.UTF-8 make test

  # ── Stage 2b: Python unit tests (matrix across supported versions) ───────────
  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.13t"
          - "3.14"
          - "3.14t"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      # Install system SFST so the sfst Python package can build from source
      # on versions that lack pre-built wheels (e.g. 3.13t, 3.14t).
      - name: Install system SFST library
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sfst

      # Place the FSA where hatchling package data expects it before running tests.
      - name: Place compiled FSA in package data directory
        run: mkdir -p python/mlmorph/data

      - uses: actions/download-artifact@v8
        with:
          name: malayalam-fsa
          path: python/mlmorph/data/

      - name: Install package with test dependencies
        run: pip install -e ".[tests]"
        working-directory: python

      - name: Run unit tests
        run: pytest test/unit/ -v
        working-directory: python

  # ── Stage 2c: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run lint
        working-directory: python
        run: |
          ruff check .
          ruff format --check .
